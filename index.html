<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Forex Backtest Simulator - Graf Jelas & Teks Sahaja</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c15;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 15px;
            color: #f0f0f0;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: #12141f;
            border-radius: 32px;
            padding: 25px 20px;
            border: 1px solid #2c2f3f;
            box-shadow: 0 25px 50px -12px black;
        }

        .header h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            text-align: center;
            color: #9aa3b8;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        kbd {
            background: #2c2f3f;
            border-radius: 6px;
            padding: 2px 8px;
            font-weight: bold;
            color: #ffd966;
            margin: 0 2px;
            display: inline-block;
        }

        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .streak-card {
            background: #1e2130;
            border-radius: 24px;
            padding: 15px 20px;
            text-align: center;
            min-width: 130px;
            border-bottom: 5px solid;
        }

        .streak-loss {
            border-bottom-color: #ff7080;
        }

        .streak-win {
            border-bottom-color: #5eff9e;
        }

        .streak-value {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .streak-loss .streak-value {
            color: #ff7080;
        }

        .streak-win .streak-value {
            color: #5eff9e;
        }

        .winrate-circle {
            background: #1e2130;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 6px #12141f, 0 0 0 9px #2c2f3f;
        }

        .winrate-circle .percent {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ffd966;
        }

        .winrate-circle span:last-child {
            font-size: 0.9rem;
            color: #b0b3cc;
            margin-top: 5px;
        }

        .basic-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #1e2130;
            border-radius: 20px;
            padding: 10px 20px;
            text-align: center;
            min-width: 90px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #ffd966;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn-win,
        .btn-loss,
        .reset-btn {
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            min-width: 150px;
            text-align: center;
        }

        .btn-win {
            background: linear-gradient(135deg, #1b8732, #2ecc71);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-loss {
            background: linear-gradient(135deg, #b33, #e74c3c);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .reset-btn {
            background: #2c2f3f;
            border: 1px solid #6c6f82;
            color: #f0f0f0;
        }

        .btn-win:hover,
        .btn-loss:hover,
        .reset-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        .finance-panel,
        .advanced-metrics,
        .chart-panel,
        .history-panel {
            background: #0e101a;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid #282b3a;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #b0b3cc;
        }

        .input-group input {
            background: #080a12;
            border: 1px solid #363a4a;
            border-radius: 12px;
            padding: 8px 12px;
            color: white;
            font-size: 0.9rem;
            width: 130px;
        }

        .metric-item {
            background: #1a1d2b;
            padding: 8px 14px;
            border-radius: 18px;
            display: inline-block;
        }

        .metric-label {
            font-size: 0.65rem;
            color: #b0b3cc;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .good {
            color: #6eff8e;
        }

        .bad {
            color: #ff7080;
        }

        canvas {
            background: #0e101a !important;
            border-radius: 16px;
            max-height: 300px;
            width: 100%;
            padding: 5px;
        }

        .log-container {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.75rem;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
        }

        .log-table th,
        .log-table td {
            padding: 6px 8px;
            text-align: left;
            border-bottom: 1px solid #2a2d3c;
        }

        .win-row {
            background: rgba(46, 204, 113, 0.1);
        }

        .loss-row {
            background: rgba(231, 76, 60, 0.1);
        }

        .icon-btn {
            background: #262a3a;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1d2b;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            max-width: 90%;
            width: 320px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .modal-yes,
        .modal-no {
            padding: 8px 25px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .modal-yes {
            background: #e74c3c;
        }

        .modal-no {
            background: #2c3e50;
        }

        /* MOBILE VERSION - DIKEMASKINI */
        @media (max-width: 600px) {

            body {
                padding: 8px;
            }

            .dashboard {
                padding: 14px 10px;
                border-radius: 22px;
            }

            .header h1 {
                font-size: 1.35rem;
            }

            .header p {
                font-size: 0.72rem;
                line-height: 1.5;
                margin-bottom: 18px;
            }

            .stats-row {
                gap: 12px;
                margin-bottom: 18px;
            }

            .winrate-circle {
                width: 125px;
                height: 125px;
            }

            .winrate-circle .percent {
                font-size: 2rem;
            }

            .streak-card {
                padding: 10px 12px;
                min-width: 92px;
                border-radius: 18px;
            }

            .streak-value {
                font-size: 1.7rem;
            }

            .basic-stats {
                gap: 10px;
                margin-bottom: 18px;
            }

            .stat-box {
                flex: 1;
                min-width: 80px;
                padding: 10px;
                border-radius: 16px;
            }

            .stat-number {
                font-size: 1.45rem;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 18px;
            }

            .btn-win,
            .btn-loss,
            .reset-btn {
                width: 100%;
                padding: 15px 10px;
                font-size: 1.05rem;
                border-radius: 18px;
                min-width: unset;
            }

            .finance-panel,
            .advanced-metrics,
            .chart-panel,
            .history-panel {
                padding: 14px;
                border-radius: 18px;
                margin-bottom: 15px;
            }

            .input-row {
                flex-direction: column;
                gap: 12px;
            }

            .input-group {
                width: 100%;
            }

            .input-group label {
                font-size: 0.7rem;
            }

            .input-group input {
                width: 100%;
                font-size: 1rem;
                padding: 12px;
                border-radius: 14px;
            }

            .metric-item {
                width: 100%;
                padding: 12px;
                border-radius: 16px;
                text-align: center;
            }

            .metric-label {
                font-size: 0.72rem;
            }

            .metric-value {
                font-size: 1.4rem;
            }

            /* GRAF EQUITY BESAR */
            .chart-panel {
                padding: 12px;
            }

            canvas {
                width: 100% !important;
                height: 360px !important;
                max-height: unset;
                border-radius: 18px;
                padding: 8px;
            }

            .log-container {
                max-height: 260px;
                font-size: 0.72rem;
            }

            .log-table th,
            .log-table td {
                padding: 8px 5px;
            }

            .icon-btn {
                width: 100%;
                padding: 12px;
                font-size: 0.85rem;
                border-radius: 14px;
            }

            .modal-content {
                width: 92%;
                border-radius: 20px;
                padding: 22px 18px;
            }

            .modal-buttons {
                gap: 10px;
            }

            .modal-yes,
            .modal-no {
                flex: 1;
                padding: 12px;
                border-radius: 14px;
            }
        }
    </style>
</head>

<body>

<div class="dashboard">
    <div class="header">
        <h1>Backtest Simulator</h1>
        <p>Tekan <kbd>1</kbd> = WIN &nbsp; | &nbsp; <kbd>2</kbd> = LOSS</p>
    </div>

    <div class="stats-row">

        <div class="streak-card streak-loss">
            <div class="streak-value">0</div>
            <div>Kalah Berturut</div>
        </div>

        <div class="winrate-circle">
            <span class="percent">68%</span>
            <span>Winrate</span>
        </div>

        <div class="streak-card streak-win">
            <div class="streak-value">5</div>
            <div>Menang Berturut</div>
        </div>

    </div>

    <div class="basic-stats">

        <div class="stat-box">
            <div class="stat-number">24</div>
            <div>Menang</div>
        </div>

        <div class="stat-box">
            <div class="stat-number">11</div>
            <div>Kalah</div>
        </div>

        <div class="stat-box">
            <div class="stat-number">35</div>
            <div>Jumlah</div>
        </div>

    </div>

    <div class="button-group">
        <button class="btn-win">WIN (1)</button>
        <button class="btn-loss">LOSS (2)</button>
        <button class="reset-btn">Reset Simulasi</button>
    </div>

    <div class="finance-panel">
        <div class="input-row">

            <div class="input-group">
                <label>Modal Awal</label>
                <input type="number" value="1000">
            </div>

            <div class="input-group">
                <label>Risk %</label>
                <input type="number" value="1">
            </div>

            <div class="input-group">
                <label>RR</label>
                <input type="text" value="1:2">
            </div>

            <div class="metric-item">
                <div class="metric-label">Net Profit</div>
                <div class="metric-value good">$425</div>
            </div>

            <div class="metric-item">
                <div class="metric-label">Profit %</div>
                <div class="metric-value">42%</div>
            </div>

            <div class="metric-item">
                <div class="metric-label">Max DD</div>
                <div class="metric-value bad">8%</div>
            </div>

        </div>
    </div>

    <div class="chart-panel">

        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
            <span style="font-weight:bold;">Equity Curve</span>
            <button class="icon-btn">Export Full Report</button>
        </div>

        <canvas id="equityChart"></canvas>

    </div>

</div>

<script>
const ctx = document.getElementById('equityChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['1','2','3','4','5','6','7'],
        datasets: [{
            label: 'Equity',
            data: [1000, 1020, 980, 1100, 1250, 1190, 1450],
            borderColor: '#5eff9e',
            backgroundColor: 'rgba(94,255,158,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointHoverRadius: 5
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,

        plugins: {
            legend: {
                labels: {
                    color: '#ddd'
                }
            }
        },

        scales: {
            y: {
                ticks: {
                    color: '#ccc'
                },
                grid: {
                    color: '#2a2d3c'
                }
            },

            x: {
                ticks: {
                    color: '#aaa'
                },
                grid: {
                    color: '#1c1f2d'
                }
            }
        }
    }
});
</script>

</body>
</html>
