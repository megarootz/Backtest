<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Winrate + Unjuran Kewangan</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --win-color: #00e676;
            --loss-color: #ff5252;
            --streak-win: #00e5ff;
            --streak-loss: #ff4081;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #ffd740;
            --border: #2a2a40;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 30% 20%, #1a1a3e 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, #1a1025 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .dashboard {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 45px 40px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .header {
            text-align: center;
        }
        .header .icon {
            font-size: 48px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c0c0d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .main-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        .streak-box {
            background: #1e1e35;
            border-radius: 24px;
            padding: 24px 18px;
            min-width: 120px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .loss-streak {
            border-bottom: 6px solid var(--streak-loss);
            background: linear-gradient(180deg, #1e1e35 0%, #2a1a28 100%);
        }
        .win-streak {
            border-bottom: 6px solid var(--streak-win);
            background: linear-gradient(180deg, #1e1e35 0%, #1a2a30 100%);
        }
        .streak-box .streak-icon {
            font-size: 2.2rem;
        }
        .streak-box .streak-value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
        }
        .loss-streak .streak-value { color: var(--streak-loss); }
        .win-streak .streak-value { color: var(--streak-win); }
        .streak-box .streak-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
        }

        .winrate-display {
            display: flex;
            justify-content: center;
        }
        .winrate-circle {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 0 8px var(--card-bg), 0 0 0 10px var(--border);
            transition: transform 0.4s;
            margin: 0 10px;
        }
        .winrate-circle .percent {
            font-size: 3.8rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }
        .winrate-circle .percent-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .winrate-circle.winning .percent { color: var(--win-color); text-shadow: 0 0 30px rgba(0,230,118,0.8); }
        .winrate-circle.losing .percent { color: var(--loss-color); text-shadow: 0 0 30px rgba(255,82,82,0.8); }
        .winrate-circle.even .percent { color: var(--accent); text-shadow: 0 0 30px rgba(255,215,64,0.5); }

        .progress-ring-container {
            position: absolute;
            top: -14px;
            left: -14px;
            width: calc(100% + 28px);
            height: calc(100% + 28px);
            pointer-events: none;
        }
        .progress-ring {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        .progress-ring .bg-circle {
            fill: none; stroke: var(--border); stroke-width: 7;
        }
        .progress-ring .fill-circle {
            fill: none; stroke: #00e676; stroke-width: 7; stroke-linecap: round;
            transition: stroke-dashoffset 0.6s, stroke 0.4s;
        }

        .basic-stats {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .stat-mini {
            background: #1e1e35;
            border-radius: 16px;
            padding: 14px 18px;
            text-align: center;
            border: 1px solid var(--border);
            min-width: 80px;
        }
        .stat-mini .val { font-size: 1.8rem; font-weight: 800; }
        .stat-mini .lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; }
        .win-stat .val { color: var(--win-color); }
        .loss-stat .val { color: var(--loss-color); }
        .total-stat .val { color: var(--accent); }

        .button-row {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 150px;
            max-width: 250px;
            padding: 24px 20px;
            font-size: 1.4rem;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-win {
            background: linear-gradient(135deg, #00c853, #00e676);
        }
        .btn-loss {
            background: linear-gradient(135deg, #d32f2f, #ff5252);
        }
        .btn:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); }
        .btn:active { transform: scale(0.96); transition: 0.08s; }

        .btn-reset {
            background: transparent;
            border: 2px solid #666;
            color: #aaa;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-reset:hover { border-color: #ccc; color: #fff; background: rgba(255,255,255,0.05); }

        /* Panel Kewangan */
        .finance-panel {
            width: 100%;
            background: #141425;
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            align-items: flex-end;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            background: #0f0f1f;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            font-size: 1rem;
            width: 140px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .result-box {
            background: #1a1a30;
            border-radius: 16px;
            padding: 16px 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
            border: 1px solid var(--border);
        }
        .result-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .result-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .result-value {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .net-profit { color: #00e676; }
        .profit-pct { color: #ffd740; }

        .history-section {
            width: 100%;
            margin-top: 5px;
            background: #141425;
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .best-streaks span { color: #fff; font-weight: 700; }

        .log-container {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 5px;
        }
        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e30;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #ccc;
            border-left: 4px solid transparent;
        }
        .win-log { border-left-color: var(--win-color); }
        .loss-log { border-left-color: var(--loss-color); }

        @media (max-width: 750px) {
            .dashboard { padding: 25px 15px; }
            .main-display { gap: 15px; }
            .streak-box { min-width: 100px; padding: 18px 12px; }
            .streak-box .streak-value { font-size: 2.2rem; }
            .winrate-circle { width: 150px; height: 150px; }
            .winrate-circle .percent { font-size: 2.8rem; }
            .btn { font-size: 1.1rem; padding: 18px; min-width: 120px; }
            .finance-panel { flex-direction: column; align-items: stretch; }
            .input-group input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div class="icon">🏆</div>
        <h1>Kalkulator Winrate</h1>
        <p class="subtitle">Rekod penuh & unjuran kewangan</p>
    </div>

    <!-- Tiga kolum utama -->
    <div class="main-display">
        <div class="streak-box loss-streak" id="streakLossBox">
            <div class="streak-icon">❄️</div>
            <div class="streak-value" id="streakLossBig">0</div>
            <div class="streak-label">Kalah Berturut</div>
        </div>

        <div class="winrate-display">
            <div class="winrate-circle even" id="winrateCircle">
                <span class="percent" id="winratePercent">0%</span>
                <span class="percent-label">Winrate</span>
                <div class="progress-ring-container">
                    <svg class="progress-ring" viewBox="0 0 200 200">
                        <circle class="bg-circle" cx="100" cy="100" r="88"/>
                        <circle class="fill-circle" id="progressFill" cx="100" cy="100" r="88"
                        stroke-dasharray="552.92" stroke-dashoffset="552.92"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="streak-box win-streak" id="streakWinBox">
            <div class="streak-icon">🔥</div>
            <div class="streak-value" id="streakWinBig">0</div>
            <div class="streak-label">Menang Berturut</div>
        </div>
    </div>

    <!-- Stat asas -->
    <div class="basic-stats">
        <div class="stat-mini win-stat" id="winCard">
            <div class="val" id="winCount">0</div>
            <div class="lbl">🏅 Menang</div>
        </div>
        <div class="stat-mini loss-stat" id="lossCard">
            <div class="val" id="lossCount">0</div>
            <div class="lbl">💔 Kalah</div>
        </div>
        <div class="stat-mini total-stat">
            <div class="val" id="totalCount">0</div>
            <div class="lbl">📊 Jumlah</div>
        </div>
    </div>

    <!-- Butang tindakan -->
    <div class="button-row">
        <button class="btn btn-win" id="btnWin">✅ WIN</button>
        <button class="btn btn-loss" id="btnLoss">❌ LOSS</button>
    </div>
    <button class="btn-reset" id="btnReset">🔄 Reset Semua</button>

    <!-- Panel Kewangan (Modal, Risiko, RR, Hasil) -->
    <div class="finance-panel">
        <div class="input-group">
            <label>💰 Modal Awal (USD)</label>
            <input type="number" id="initialCapital" value="1000" step="any" min="0" placeholder="1000">
        </div>
        <div class="input-group">
            <label>📉 Risiko per Trade (%)</label>
            <input type="number" id="riskPercent" value="1" step="0.01" min="0" placeholder="1">
        </div>
        <div class="input-group">
            <label>⚖️ RR (cth: 1:1.5)</label>
            <input type="text" id="rrInput" value="1:1.5" placeholder="1:1.5">
        </div>
        <div class="result-box">
            <div class="result-item">
                <span class="result-label">Keuntungan Bersih</span>
                <span class="result-value net-profit" id="netProfitDisplay">$0</span>
            </div>
            <div class="result-item">
                <span class="result-label">Keuntungan %</span>
                <span class="result-value profit-pct" id="profitPctDisplay">0%</span>
            </div>
        </div>
    </div>

    <!-- Sejarah backtest -->
    <div class="history-section">
        <div class="history-header">
            <div class="history-title" style="color:#fff; font-weight:700;">📋 Log Backtest</div>
            <div class="best-streaks" style="color:var(--text-secondary); font-size:0.85rem;">
                🔥 Rekod Menang Tertinggi: <strong id="bestWinStreak">0</strong> &nbsp;&nbsp;
                ❄️ Rekod Kalah Tertinggi: <strong id="bestLossStreak">0</strong>
            </div>
        </div>
        <div class="log-container" id="logContainer">
            <div style="color:#666; text-align:center; padding:15px;">Tiada rekod. Klik WIN/LOSS.</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // State utama
        let wins = 0;
        let losses = 0;
        let currentStreakType = null;
        let currentStreakCount = 0;
        let history = [];

        // DOM statik
        const winCountEl = document.getElementById('winCount');
        const lossCountEl = document.getElementById('lossCount');
        const totalCountEl = document.getElementById('totalCount');
        const winratePercentEl = document.getElementById('winratePercent');
        const winrateCircle = document.getElementById('winrateCircle');
        const progressFill = document.getElementById('progressFill');
        const streakWinBig = document.getElementById('streakWinBig');
        const streakLossBig = document.getElementById('streakLossBig');
        const logContainer = document.getElementById('logContainer');
        const bestWinStreakEl = document.getElementById('bestWinStreak');
        const bestLossStreakEl = document.getElementById('bestLossStreak');
        const winCard = document.getElementById('winCard');
        const lossCard = document.getElementById('lossCard');

        // Elemen kewangan
        const initialCapitalInput = document.getElementById('initialCapital');
        const riskPercentInput = document.getElementById('riskPercent');
        const rrInput = document.getElementById('rrInput');
        const netProfitDisplay = document.getElementById('netProfitDisplay');
        const profitPctDisplay = document.getElementById('profitPctDisplay');

        const circumference = 2 * Math.PI * 88;

        function calcWinrate() {
            const total = wins + losses;
            return total === 0 ? 0 : Math.round((wins / total) * 100);
        }

        function parseRR(rrString) {
            // Terima format "1:1.5", "1:2", "2:1", "1.5" (hanya reward)
            const parts = rrString.split(':');
            if (parts.length === 2) {
                const riskPart = parseFloat(parts[0]);
                const rewardPart = parseFloat(parts[1]);
                if (!isNaN(riskPart) && !isNaN(rewardPart) && riskPart !== 0) {
                    return rewardPart / riskPart; // pulangan dari risk
                }
            } else if (parts.length === 1) {
                const reward = parseFloat(parts[0]);
                if (!isNaN(reward)) return reward;
            }
            return null; // tidak sah
        }

        function calculateFinancials() {
            const capital = parseFloat(initialCapitalInput.value);
            const riskPct = parseFloat(riskPercentInput.value);
            const rrStr = rrInput.value.trim();
            const rewardMultiplier = parseRR(rrStr);

            if (isNaN(capital) || capital <= 0 || isNaN(riskPct) || riskPct <= 0 || rewardMultiplier === null) {
                netProfitDisplay.textContent = '--';
                profitPctDisplay.textContent = '--';
                return;
            }

            const riskFraction = riskPct / 100;
            const winFactor = 1 + riskFraction * rewardMultiplier;
            const lossFactor = 1 - riskFraction;

            let finalCapital = capital * Math.pow(winFactor, wins) * Math.pow(lossFactor, losses);
            if (finalCapital < 0) finalCapital = 0;

            const netProfit = finalCapital - capital;
            const profitPercent = capital !== 0 ? (netProfit / capital) * 100 : 0;

            netProfitDisplay.textContent = '$' + netProfit.toFixed(2);
            profitPctDisplay.textContent = profitPercent.toFixed(2) + '%';
        }

        function updateUI() {
            const total = wins + losses;
            const winrate = calcWinrate();

            winCountEl.textContent = wins;
            lossCountEl.textContent = losses;
            totalCountEl.textContent = total;
            winratePercentEl.textContent = winrate + '%';

            const offset = circumference - (winrate / 100) * circumference;
            progressFill.style.strokeDashoffset = offset;

            if (total === 0) {
                progressFill.style.stroke = '#555';
                winrateCircle.className = 'winrate-circle even';
            } else if (winrate >= 60) {
                progressFill.style.stroke = '#00e676';
                winrateCircle.className = 'winrate-circle winning';
            } else if (winrate <= 40) {
                progressFill.style.stroke = '#ff5252';
                winrateCircle.className = 'winrate-circle losing';
            } else {
                progressFill.style.stroke = '#ffd740';
                winrateCircle.className = 'winrate-circle even';
            }

            let displayWinStreak = 0, displayLossStreak = 0;
            if (currentStreakType === 'win') displayWinStreak = currentStreakCount;
            else if (currentStreakType === 'loss') displayLossStreak = currentStreakCount;
            streakWinBig.textContent = displayWinStreak;
            streakLossBig.textContent = displayLossStreak;

            updateBestStreaks();
            calculateFinancials();
        }

        function updateBestStreaks() {
            let maxWin = 0, maxLoss = 0, tempWin = 0, tempLoss = 0;
            for (let entry of history) {
                if (entry.type === 'win') {
                    tempWin++; tempLoss = 0;
                    if (tempWin > maxWin) maxWin = tempWin;
                } else {
                    tempLoss++; tempWin = 0;
                    if (tempLoss > maxLoss) maxLoss = tempLoss;
                }
            }
            bestWinStreakEl.textContent = maxWin;
            bestLossStreakEl.textContent = maxLoss;
        }

        function addLogEntry(type, winrateAt) {
            history.push({ step: history.length+1, type, winrate: winrateAt, wins, losses });
            renderLog();
        }

        function renderLog() {
            if (!history.length) {
                logContainer.innerHTML = '<div style="color:#666; text-align:center; padding:15px;">Tiada rekod.</div>';
                return;
            }
            const recent = history.slice(-30).reverse();
            logContainer.innerHTML = recent.map(e => `
                <div class="log-entry ${e.type === 'win' ? 'win-log' : 'loss-log'}">
                    <span style="font-weight:600;">#${e.step}</span>
                    <span style="text-transform:uppercase; font-weight:700;">${e.type}</span>
                    <span>M:${e.wins} | K:${e.losses}</span>
                    <span style="color:#ffd740;">WR: ${e.winrate}%</span>
                </div>
            `).join('');
        }

        function addWin() {
            currentStreakType = (currentStreakType === 'win') ? 'win' : 'win'; // reset jika dari loss
            if (currentStreakType === 'win') currentStreakCount++;
            else { currentStreakType = 'win'; currentStreakCount = 1; }
            wins++;
            addLogEntry('win', calcWinrate());
            updateUI();
            winCard.classList.add('flash-win'); setTimeout(() => winCard.classList.remove('flash-win'), 500);
            winrateCircle.style.transform = 'scale(1.05)'; setTimeout(() => winrateCircle.style.transform = 'scale(1)', 200);
        }

        function addLoss() {
            if (currentStreakType === 'loss') currentStreakCount++;
            else { currentStreakType = 'loss'; currentStreakCount = 1; }
            losses++;
            addLogEntry('loss', calcWinrate());
            updateUI();
            lossCard.classList.add('flash-loss'); setTimeout(() => lossCard.classList.remove('flash-loss'), 500);
            winrateCircle.style.transform = 'scale(1.05)'; setTimeout(() => winrateCircle.style.transform = 'scale(1)', 200);
        }

        function resetAll() {
            if (!wins && !losses && !history.length) return;
            wins = 0; losses = 0;
            currentStreakType = null; currentStreakCount = 0;
            history = [];
            updateUI();
            logContainer.innerHTML = '<div style="color:#666; text-align:center; padding:15px;">Tiada rekod.</div>';
            winrateCircle.style.transform = 'scale(0.95)'; setTimeout(() => winrateCircle.style.transform = 'scale(1)', 200);
        }

        // Event listeners butang
        document.getElementById('btnWin').addEventListener('click', addWin);
        document.getElementById('btnLoss').addEventListener('click', addLoss);
        document.getElementById('btnReset').addEventListener('click', resetAll);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') { e.preventDefault(); addWin(); }
            else if (e.key === 'l' || e.key === 'L') { e.preventDefault(); addLoss(); }
            else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetAll(); }
        });

        // Auto update kewangan bila input berubah
        initialCapitalInput.addEventListener('input', calculateFinancials);
        riskPercentInput.addEventListener('input', calculateFinancials);
        rrInput.addEventListener('input', calculateFinancials);

        // Initial
        updateUI();
    })();
</script>
</body>
</html>
