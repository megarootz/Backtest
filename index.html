<body>

<div class="dashboard">

    <div class="header">
        <h1>Backtest Simulator</h1>
        <p>Tekan <kbd>1</kbd> = WIN | <kbd>2</kbd> = LOSS</p>
    </div>

    <div class="stats-row">

        <div class="streak-card streak-loss">
            <div class="streak-value" id="streakLoss">0</div>
            <div>Kalah Berturut</div>
        </div>

        <div class="winrate-circle">
            <span class="percent" id="winrate">0%</span>
            <span>Winrate</span>
        </div>

        <div class="streak-card streak-win">
            <div class="streak-value" id="streakWin">0</div>
            <div>Menang Berturut</div>
        </div>

    </div>

    <div class="basic-stats">

        <div class="stat-box">
            <div class="stat-number" id="winCount">0</div>
            <div>Menang</div>
        </div>

        <div class="stat-box">
            <div class="stat-number" id="lossCount">0</div>
            <div>Kalah</div>
        </div>

        <div class="stat-box">
            <div class="stat-number" id="totalCount">0</div>
            <div>Jumlah</div>
        </div>

    </div>

    <div class="button-group">
        <button class="btn-win" id="btnWin">WIN (1)</button>
        <button class="btn-loss" id="btnLoss">LOSS (2)</button>
        <button class="reset-btn" id="resetBtn">RESET</button>
    </div>

    <div class="finance-panel">
        <div class="input-row">

            <div class="metric-item">
                <div class="metric-label">Equity</div>
                <div class="metric-value good" id="equityValue">$1000</div>
            </div>

        </div>
    </div>

    <div class="chart-panel">
        <canvas id="equityChart"></canvas>
    </div>

    <div class="history-panel">

        <div class="log-container">

            <table class="log-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Result</th>
                        <th>Equity</th>
                    </tr>
                </thead>

                <tbody id="logTableBody">
                    <tr>
                        <td colspan="3" style="text-align:center;">
                            Tiada rekod.
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</div>

<script>

let wins = 0;
let losses = 0;
let streakWin = 0;
let streakLoss = 0;
let equity = 1000;
let history = [];

const winCount = document.getElementById('winCount');
const lossCount = document.getElementById('lossCount');
const totalCount = document.getElementById('totalCount');
const winrate = document.getElementById('winrate');
const streakWinEl = document.getElementById('streakWin');
const streakLossEl = document.getElementById('streakLoss');
const equityValue = document.getElementById('equityValue');
const logTableBody = document.getElementById('logTableBody');

const ctx = document.getElementById('equityChart');

let chartData = [1000];

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Start'],
        datasets: [{
            label: 'Equity',
            data: chartData,
            borderColor: '#5eff9e',
            backgroundColor: 'rgba(94,255,158,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                labels: {
                    color: '#ddd'
                }
            }
        },
        scales: {
            y: {
                ticks: {
                    color: '#ccc'
                },
                grid: {
                    color: '#2a2d3c'
                }
            },
            x: {
                ticks: {
                    color: '#aaa'
                },
                grid: {
                    color: '#1c1f2d'
                }
            }
        }
    }
});

function updateUI() {

    winCount.textContent = wins;
    lossCount.textContent = losses;
    totalCount.textContent = wins + losses;

    const total = wins + losses;
    const wr = total === 0 ? 0 : ((wins / total) * 100).toFixed(0);

    winrate.textContent = wr + '%';

    streakWinEl.textContent = streakWin;
    streakLossEl.textContent = streakLoss;

    equityValue.textContent = '$' + equity.toFixed(2);

    if(history.length === 0) {
        logTableBody.innerHTML = `
            <tr>
                <td colspan="3" style="text-align:center;">
                    Tiada rekod.
                </td>
            </tr>
        `;
        return;
    }

    let html = '';

    [...history].reverse().forEach(h => {

        html += `
            <tr class="${h.type === 'WIN' ? 'win-row' : 'loss-row'}">
                <td>#${h.id}</td>
                <td>${h.type}</td>
                <td>$${h.equity.toFixed(2)}</td>
            </tr>
        `;

    });

    logTableBody.innerHTML = html;
}

function addWin() {

    wins++;
    streakWin++;
    streakLoss = 0;

    equity *= 1.02;

    history.push({
        id: history.length + 1,
        type: 'WIN',
        equity: equity
    });

    chart.data.labels.push('#' + history.length);
    chart.data.datasets[0].data.push(equity);
    chart.update();

    updateUI();
}

function addLoss() {

    losses++;
    streakLoss++;
    streakWin = 0;

    equity *= 0.99;

    history.push({
        id: history.length + 1,
        type: 'LOSS',
        equity: equity
    });

    chart.data.labels.push('#' + history.length);
    chart.data.datasets[0].data.push(equity);
    chart.update();

    updateUI();
}

function resetAll() {

    wins = 0;
    losses = 0;
    streakWin = 0;
    streakLoss = 0;
    equity = 1000;
    history = [];

    chart.data.labels = ['Start'];
    chart.data.datasets[0].data = [1000];
    chart.update();

    updateUI();
}

// BUTTON WORKING

document.getElementById('btnWin').addEventListener('click', addWin);
document.getElementById('btnLoss').addEventListener('click', addLoss);
document.getElementById('resetBtn').addEventListener('click', resetAll);

// KEYBOARD

document.addEventListener('keydown', (e) => {

    if(e.key === '1') {
        addWin();
    }

    if(e.key === '2') {
        addLoss();
    }

});

updateUI();

</script>

</body>
</html>
